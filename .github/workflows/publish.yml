name: Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run build + test only, skip npm publish'
        required: false
        default: 'true'

permissions:
  contents: read

jobs:
  publish:
    name: Build, test, publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm --provenance to mint the signed attestation via GitHub's OIDC token
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        if: github.event_name == 'push'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (-> $TAG_VERSION) does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Publishing version $PKG_VERSION"

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm
        if: github.event_name == 'push' || github.event.inputs.dry_run != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
